name: Build assessment runtime image

on:
  workflow_dispatch:
    inputs:
      baseline_sha:
        description: Full commit SHA referenced by the immutable baseline-v5 tag
        required: true
        type: string
      temurin_base:
        description: Digest-pinned eclipse-temurin Java 21 base image
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      BASELINE_SHA: ${{ inputs.baseline_sha }}
      BASELINE_TAG: baseline-v5
      TEMURIN_BASE: ${{ inputs.temurin_base }}
      RELEASE_EVIDENCE: ${{ runner.temp }}/streamlens-java-v5-release-evidence-${{ github.run_id }}
    steps:
      - name: Validate immutable input syntax
        run: |
          set -euo pipefail
          if [[ ! "$BASELINE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "baseline_sha must be a full lowercase commit SHA" >&2
            exit 2
          fi
          if [[ ! "$TEMURIN_BASE" =~ ^eclipse-temurin:21-jdk-[A-Za-z0-9._-]+@sha256:[0-9a-f]{64}$ ]]; then
            echo "temurin_base must be an eclipse-temurin Java 21 name@sha256 reference" >&2
            exit 2
          fi

      - name: Check out exact tagged baseline source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.BASELINE_SHA }}
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Verify baseline tag and checkout
        run: |
          set -euo pipefail
          actual=$(git -c core.fsmonitor=false -c core.hooksPath=/dev/null rev-parse --verify 'HEAD^{commit}')
          tagged=$(git -c core.fsmonitor=false -c core.hooksPath=/dev/null rev-parse --verify "refs/tags/$BASELINE_TAG^{commit}")
          if [[ "$actual" != "$BASELINE_SHA" || "$tagged" != "$BASELINE_SHA" ]]; then
            echo "$BASELINE_TAG, requested SHA, and checked-out SHA must be identical" >&2
            exit 2
          fi
          umask 077
          mkdir -m 0700 "$RELEASE_EVIDENCE"
          {
            printf 'assessment_version=java-v5\n'
            printf 'baseline_tag=%s\n' "$BASELINE_TAG"
            printf 'baseline_sha=%s\n' "$BASELINE_SHA"
            printf 'temurin_base=%s\n' "$TEMURIN_BASE"
          } >"$RELEASE_EVIDENCE/release-pins.txt"

      - name: Build and push immutable runtime
        id: image
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          owner=$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/streamlens-java-assessment"
          tag="java-v5-${BASELINE_SHA}"
          printf '%s' "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          docker build \
            --pull \
            --build-arg "TEMURIN_BASE=$TEMURIN_BASE" \
            --label "org.opencontainers.image.revision=$BASELINE_SHA" \
            --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
            --label "com.streamlens.assessment.version=java-v5" \
            --tag "$image:$tag" \
            --file assessment/Dockerfile .
          docker push "$image:$tag"
          registry_digest=$(docker buildx imagetools inspect \
            --format '{{.Manifest.Digest}}' "$image:$tag")
          digest="$image@$registry_digest"
          if [[ ! "$digest" =~ ^ghcr\.io/.+@sha256:[0-9a-f]{64}$ ]]; then
            echo "could not resolve the pushed registry manifest digest" >&2
            exit 2
          fi
          printf 'digest=%s\n' "$digest" >>"$GITHUB_OUTPUT"
          printf 'assessment_image=%s\n' "$digest" >>"$RELEASE_EVIDENCE/release-pins.txt"

      - name: Pull exact digest and run complete real-runtime canary
        env:
          ASSESSMENT_DOCKER_IMAGE: ${{ steps.image.outputs.digest }}
        run: |
          set -euo pipefail
          docker pull "$ASSESSMENT_DOCKER_IMAGE" >"$RELEASE_EVIDENCE/docker-pull.log" 2>&1
          expected_source="https://github.com/$GITHUB_REPOSITORY"
          actual_revision=$(docker image inspect --format \
            '{{ index .Config.Labels "org.opencontainers.image.revision" }}' \
            "$ASSESSMENT_DOCKER_IMAGE")
          actual_version=$(docker image inspect --format \
            '{{ index .Config.Labels "com.streamlens.assessment.version" }}' \
            "$ASSESSMENT_DOCKER_IMAGE")
          actual_source=$(docker image inspect --format \
            '{{ index .Config.Labels "org.opencontainers.image.source" }}' \
            "$ASSESSMENT_DOCKER_IMAGE")
          [[ "$actual_revision" == "$BASELINE_SHA" \
             && "$actual_version" == java-v5 \
             && "$actual_source" == "$expected_source" ]] || {
            echo 'exact image provenance labels do not match the release inputs' >&2
            exit 2
          }
          {
            printf 'expected_revision=%s\n' "$BASELINE_SHA"
            printf 'actual_revision=%s\n' "$actual_revision"
            printf 'actual_version=%s\n' "$actual_version"
            printf 'actual_source=%s\n' "$actual_source"
          } >"$RELEASE_EVIDENCE/image-provenance.txt"
          REQUIRE_DOCKER_RUNTIME=1 bash --noprofile --norc scripts/isolation-test.sh \
            >"$RELEASE_EVIDENCE/exact-image-canary.log" 2>&1
          cat "$RELEASE_EVIDENCE/exact-image-canary.log"
          {
            echo '# Java v5 assessment image canary passed'
            echo
            echo "- Baseline tag: \`$BASELINE_TAG\`"
            echo "- Baseline SHA: \`$BASELINE_SHA\`"
            echo "- Temurin base: \`$TEMURIN_BASE\`"
            echo "- Exact runtime: \`$ASSESSMENT_DOCKER_IMAGE\`"
            echo '- Canary: restrictions, functional tests, benchmark, CPU JFR, allocation JFR'
            echo
            echo 'The SHA and digest still require review and explicit pins in the trusted PR workflow.'
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Retain release canary evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: java-v5-image-canary-${{ github.run_id }}
          path: ${{ env.RELEASE_EVIDENCE }}/
          if-no-files-found: error
          retention-days: 90
