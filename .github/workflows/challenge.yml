name: Java challenge CI

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      candidate_repository:
        description: Public owner/repository containing the candidate commit
        required: true
        type: string
      candidate_sha:
        description: Exact 40-character candidate commit SHA
        required: true
        type: string
      base_sha:
        description: Exact upstream starter/base commit used for scope comparison
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: java-challenge-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  BASELINE_SHA: 8aca57c05d160fa16d84411313a4e8271399f96a

jobs:
  baseline-canary:
    name: Immutable baseline canary
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out immutable baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.BASELINE_SHA }}
          persist-credentials: false

      - name: Verify immutable revision
        shell: bash
        run: |
          set -euo pipefail
          actual=$(git rev-parse HEAD)
          if [[ "$actual" != "$BASELINE_SHA" ]]; then
            echo "expected baseline $BASELINE_SHA, got $actual" >&2
            exit 1
          fi

      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Run baseline correctness and policy canaries
        run: make check

      - name: Run all benchmark workloads once
        run: make benchmark-smoke

      - name: Write canary summary
        if: always()
        shell: bash
        run: |
          {
            echo '## StreamLens Java baseline canary'
            echo
            echo "- Assessment: \`java-v1\`"
            echo "- Baseline: \`$BASELINE_SHA\`"
            echo '- Runtime: Java 21 / Gradle 9.6.1'
            echo '- This validates the immutable runtime; candidate scoring runs in the private evaluator.'
          } >> "$GITHUB_STEP_SUMMARY"

  candidate-check:
    name: Candidate input and correctness
    if: github.event_name != 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      EVENT_NAME: ${{ github.event_name }}
      PR_CANDIDATE_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
      PR_CANDIDATE_SHA: ${{ github.event.pull_request.head.sha }}
      PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
      INPUT_CANDIDATE_REPOSITORY: ${{ inputs.candidate_repository }}
      INPUT_CANDIDATE_SHA: ${{ inputs.candidate_sha }}
      INPUT_BASE_SHA: ${{ inputs.base_sha }}
    steps:
      - name: Resolve and validate exact revisions
        id: revisions
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == pull_request_target ]]; then
            repository=$PR_CANDIDATE_REPOSITORY
            candidate_sha=$PR_CANDIDATE_SHA
            base_sha=$PR_BASE_SHA
          else
            repository=$INPUT_CANDIDATE_REPOSITORY
            candidate_sha=$INPUT_CANDIDATE_SHA
            base_sha=$INPUT_BASE_SHA
          fi
          if [[ ! "$repository" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "invalid candidate repository: $repository" >&2
            exit 1
          fi
          if [[ ! "$candidate_sha" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo 'candidate SHA must contain exactly 40 hexadecimal characters' >&2
            exit 1
          fi
          if [[ ! "$base_sha" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo 'base SHA must contain exactly 40 hexadecimal characters' >&2
            exit 1
          fi
          {
            echo "repository=$repository"
            echo "candidate_sha=${candidate_sha,,}"
            echo "base_sha=${base_sha,,}"
          } >> "$GITHUB_OUTPUT"

      - name: Check out trusted immutable baseline
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.BASELINE_SHA }}
          path: trusted
          persist-credentials: false

      - name: Check out exact candidate commit as data
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ${{ steps.revisions.outputs.repository }}
          ref: ${{ steps.revisions.outputs.candidate_sha }}
          path: candidate
          fetch-depth: 0
          persist-credentials: false
          submodules: false
          lfs: false
          allow-unsafe-pr-checkout: true

      - name: Validate candidate input, scope, source, and changed notes
        id: policy
        shell: bash
        run: |
          set -euo pipefail
          trusted_sha=$(git -C trusted rev-parse HEAD)
          candidate_sha=$(git -C candidate rev-parse HEAD)
          if [[ "$trusted_sha" != "$BASELINE_SHA" ]]; then
            echo "trusted checkout mismatch: $trusted_sha" >&2
            exit 1
          fi
          if [[ "$candidate_sha" != "${{ steps.revisions.outputs.candidate_sha }}" ]]; then
            echo "candidate checkout mismatch: $candidate_sha" >&2
            exit 1
          fi
          trusted/scripts/check-submission.sh \
            candidate \
            "${{ steps.revisions.outputs.base_sha }}" \
            "$candidate_sha" \
            "$GITHUB_OUTPUT"

      - name: Build baseline-owned candidate tree
        shell: bash
        run: |
          set -euo pipefail
          trusted/scripts/prepare-candidate.sh \
            trusted \
            candidate \
            "${{ steps.revisions.outputs.candidate_sha }}" \
            work

      - name: Set up Java 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: true

      - name: Run protected correctness tests
        working-directory: work
        run: ./gradlew test

      - name: Run preliminary benchmark canary
        if: steps.policy.outputs.submission_mode != 'notes-only'
        working-directory: work
        run: ./gradlew benchmarkSmoke

      - name: Write candidate summary
        if: always()
        shell: bash
        env:
          SUBMISSION_MODE: ${{ steps.policy.outputs.submission_mode }}
          CANDIDATE_SHA: ${{ steps.revisions.outputs.candidate_sha }}
        run: |
          {
            echo '## StreamLens Java candidate check'
            echo
            echo "- Assessment: \`java-v1\`"
            echo "- Candidate: \`$CANDIDATE_SHA\`"
            echo "- Submission mode: \`${SUBMISSION_MODE:-unavailable}\`"
            echo '- Public CI validates scope, source policy, protected correctness, and benchmark wiring.'
            echo '- Performance tier and retained evidence come from the separate private evaluator.'
          } >> "$GITHUB_STEP_SUMMARY"
